name: Quality Check

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.19.0"

jobs:
  quality-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test

      - name: Check version sync
        run: pnpm run check:versions

      - name: Check Claude/OpenCode command parity
        run: pnpm run check:command-parity

      - name: Check Claude/OpenCode agent parity
        run: pnpm run check:agent-parity

      - name: Verify OpenCode CLI wiring
        run: pnpm run check:opencode
